<!DOCTYPE html>
<html>
<head>
  <title>IPTV Premium Login</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #0d0d0d;
      color: white;
    }
    input {
      padding: 10px;
      margin: 5px;
      width: 220px;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px 20px;
      background: #e50914;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      color: yellow;
      font-size: 18px;
      text-decoration: none;
    }
  </style>
</head>
<body>

<h2>🔒 IPTV Premium</h2>
<p>Silakan login untuk akses</p>

<input type="text" id="user" placeholder="Username"><br>
<input type="password" id="pass" placeholder="Password"><br>

<button onclick="login()">Login</button>

<div id="result"></div>

<script>
function login(){
  var u = document.getElementById("user").value;
  var p = document.getElementById("pass").value;

  if(u === "vip" && p === "12345"){
    document.getElementById("result").innerHTML =
      '<a href="https://saputrasp.github.io/Premium_TV/New%20VOD%20April.m3u">▶️ MASUK IPTV</a>';
  } else {
    document.getElementById("result").innerHTML = "❌ Username / Password salah!";
  }
}
</script>

</body>
</html>
