<!DOCTYPE html>
<html>
<head>
  <title>Login IPTV Premium</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #111;
      color: white;
    }
    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }
    button {
      padding: 10px 20px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }
    a {
      color: yellow;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h2>🔒 Login IPTV Premium</h2>

<input type="text" id="user" placeholder="Username"><br>
<input type="password" id="pass" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="result"></p>

<script>
function login(){
  var u = document.getElementById("user").value;
  var p = document.getElementById("pass").value;

  if(u === "admin" && p === "192168"){
    document.getElementById("result").innerHTML =
      '<br><a href="https://saputrasp.github.io/Premium_TV/VOD%20Baru%20April.m3u">▶️ Masuk IPTV</a>';
  } else {
    document.getElementById("result").innerHTML = "❌ Username / Password salah!";
  }
}
</script>

</body>
</html>
